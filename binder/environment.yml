# a mybinder.org-ready environment for demoing jupyterlab_launchpad
# this environment may also be used locally on Linux/MacOS/Windows, e.g.
#
#   conda env update --file binder/environment.yml
#   conda activate jupyterlab-launchpad-demo
#
name: jupyterlab-launchpad-demo

channels:
  - conda-forge

dependencies:
  # runtime dependencies
  - python >=3.10,<3.11.0a0
  - jupyterlab >=4.2.0,<5
  - jupyterlab_server >=2.27.1
  # labextension build dependencies
  - git
  - nodejs >=22.12,<23
  # additional packages for demos
  - nebi-cli =0.13
  - pixi
  - pip
  - wheel
  # - ipywidgets
  - pip:
      # we have to switch back to PyPI after nb-nebi-kernels#5 is released - this is just for testing purpose.
      - nb-nebi-kernels @ git+https://github.com/nebari-dev/nb-nebi-kernels.git@01b69406eddcd09e9d1dd541dc642d6267fbd177
      - jupyter-server-proxy
      - jupyter-vscode-proxy
